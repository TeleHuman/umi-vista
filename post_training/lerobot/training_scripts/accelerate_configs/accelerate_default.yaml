compute_environment: LOCAL_MACHINE
debug: false
distributed_type: MULTI_GPU # MULTI_GPU or DEEPSPEED
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
# number of nodes
num_machines: 1
# number of gpus per node
num_processes: 1
# mixed precision
mixed_precision: 'bf16'
# rdzv backend
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
